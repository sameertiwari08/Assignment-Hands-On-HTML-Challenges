<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple HTML Tooltip</title>
</head>

<body style="font-family: sans-serif; text-align: center; margin-top: 100px;">

    <h1>Native HTML Tooltip Example</h1>

    <p>
        Bring your mouse over
        <strong title="Surprise! This is the simplest HTML tooltip." style="color: #0076ff; cursor: help;">
            this text
        </strong>
        to see the tooltip.
    </p>

</body>

</html>
