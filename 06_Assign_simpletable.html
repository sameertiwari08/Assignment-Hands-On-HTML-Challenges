<!DOCTYPE html>
<html lang="en">

<head>

    <title> Simple Table</title>

        </tr>
        <tr>
            <td>memory</td>

        <tr>

        </tr>

        </tr>
        <tr>
            <td>System env2</td>

        </tr>
        <tr>
            <td rowspan="2">system memory</td>

            <td>E</td>
        </tr>
        <tr>
            <tD>keyboard</tD>

        </tr>

</html>
